<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Table</title>
    <link rel="stylesheet" href="/Css/navigation.css">
    <link rel="stylesheet" href="/Css/projecttable.css">
    <script src="/JS/navigation.js" defer></script>
    <script type="module" src="/JS/projecttable.js"></script>
</head>
<body>
    <header class="top-nav">
        <nav class="nav-links">
            <button class="navButton" id="navButton1"></button>
            <button class="navButton" id="navButton2"></button>
            <button class="navButton" id="navButton3"></button>
        </nav>
    </header>
    <main>
        <section class="hero">
            <h1>Project Table</h1>
        </section>
        <section class="tableSearch">
            <form role="search">
                <label for="table-search">Search the table:</label>
                <input type="search" id="table-search" name="q" placeholder="Search...">
            </form>
        </section>
        <section class="projects-table">

            <table id="table">
                <tbody>
                    <tr>
                        <th id="sort-name">Project Name</th>
                        <th>Project Description</th>
                        <th>Project Status</th>
                        <th>Project Date</th>
                    </tr>
                </tbody>
            </table>
        </section>

    </main>
</body>
</html>
